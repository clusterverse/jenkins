---

- name: clusterverse/deploy | create (and/or optionally destroy) the cluster VMs
  hosts: localhost
  gather_facts: false
  tasks:
    - assert: { that: "['clusterverse.clusterverse'] is subset(galaxy_collections.keys())", success_msg: "clusterverse collections dependencies are met", fail_msg: "Please ensure the clusterverse collections are installed: ansible-galaxy install -r requirements.yml)" }
      vars: { galaxy_collections: "{{lookup('pipe', 'ansible-galaxy collection list --format=json', errors='ignore') | from_json | json_query('*') | combine }}" }

    - { include_role: { name: "clusterverse.clusterverse.destroy", apply: { tags: ["clusterverse_destroy"]} }, tags: ["clusterverse_destroy"], when: "destroy_lifecycle is defined" }
    - { include_role: { name: "clusterverse.clusterverse.create", apply: { tags: ["clusterverse_create"]} }, tags: ["clusterverse_create"] }
    - { include_role: { name: "clusterverse.clusterverse.dynamic_inventory", apply: { tags: ["always"]} }, tags: ["always"] }

- name: clusterverse/deploy | Configure the cluster VM OSs (excluding the not-being-redeployed hosts)
  hosts: all:!not_target_hosts
  gather_facts: false
  tasks: [ { include_role: { name: "clusterverse.clusterverse.config", apply: { tags: ["clusterverse_config"]} }, tags: ["clusterverse_config"] } ]


###### Application roles ######
- name: clusterverse/deploy/application | load clusterverse dependencies (if excluded due to --skips-tags)
  hosts: all
  gather_facts: false
  tasks:
    - { include_role: { name: "clusterverse.clusterverse._dependencies", apply: { tags: ["always"] } }, tags: ["always"], when: "'clusterverse_config' not in ansible_run_tags" }      # If we --skip-tags=clusterverse_config, this will ensure the variables from /cluster_defs are loaded.
    - { include_role: { name: "clusterverse.clusterverse.cluster_hosts", tasks_from: "get_cluster_hosts_state.yml", apply: { tags: ["always"] } }, tags: ["always"], when: "'clusterverse_create' not in ansible_run_tags" }      # If we --skip-tags=clusterverse_create, this will ensure cluster_suffix is defined.

- name: application | Jenkins common tasks
  hosts: all:!not_target_hosts
  tasks: [ { include_role: { name: "jenkins/_common", apply: {tags: ["jenkins_common"]} }, tags: ["jenkins_common"] } ]

- name: application | Jenkins controller tasks
  hosts: controller:!not_target_hosts
  tasks: [ { include_role: { name: "jenkins/controller", apply: {tags: ["jenkins_controller"]} }, tags: ["jenkins_controller"] } ]

- name: application | Jenkins agent tasks
  hosts: agent:!not_target_hosts
  tasks: [ { include_role: { name: "jenkins/agent", apply: {tags: ["jenkins_agent"]} }, tags: ["jenkins_agent"] } ]
###### Application roles ######


- name: clusterverse/deploy | Perform cluster readiness operations.  readiness_cnames and readiness_clean are so-tagged to ensure that during a redeeploy, they will be skipped, until after the cluster is redeployed.
  hosts: localhost
  gather_facts: false
  tasks:
    - { include_role: { name: "clusterverse.clusterverse.readiness", tasks_from: "reenable_systemd.yml" } }
    - { include_role: { name: "clusterverse.clusterverse.readiness", tasks_from: "dns_cname.yml", apply: { tags: ["readiness_cnames"]} }, tags: ["readiness_cnames"] }
    - { include_role: { name: "clusterverse.clusterverse.readiness", tasks_from: "clean_tmp.yml", apply: { tags: ["readiness_clean"]} }, tags: ["readiness_clean"] }
