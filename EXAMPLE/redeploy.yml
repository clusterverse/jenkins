---

- name: clusterverse/redeploy | Redeploy the cluster
  hosts: localhost
  gather_facts: false
  tasks:
    - assert: { that: "['clusterverse.clusterverse'] is subset(galaxy_collections.keys())", success_msg: "clusterverse collections dependencies are met", fail_msg: "Please ensure the clusterverse collections are installed: ansible-galaxy install -r requirements.yml)" }
      vars: { galaxy_collections: "{{lookup('pipe', 'ansible-galaxy collection list --format=json', errors='ignore') | from_json | json_query('*') | combine }}" }
      tags: ["always"]

    - name: clusterverse/redeploy | Run redeploy
      include_role:
        name: clusterverse.clusterverse.redeploy
      vars:
        deployplaybook: "deploy.yml"
        predeleterole: ""


- name: clusterverse/redeploy | clusterverse.readiness
  hosts: localhost
  gather_facts: false
  tasks: [ { name: "clusterverse/redeploy | clusterverse.readiness/clean_tmp", include_role: { name: "clusterverse.clusterverse.readiness", tasks_from: "clean_tmp.yml"}} ]
